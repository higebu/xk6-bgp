version: "2"

linters:
  default: standard
  settings:
    errcheck:
      # Close() errors on already-closed or RST'd sockets are noise; the
      # underlying read/write would have surfaced the same failure.
      exclude-functions:
        - (net.Conn).Close
        - (net.Listener).Close
        - (io.Closer).Close
  exclusions:
    rules:
      # _test files use t.Fatalf for fatal errors; errcheck would
      # double-report failures from already-failing helpers.
      - path: _test\.go
        linters:
          - errcheck
